<template>
    <lightning-card title="Local Weather Forecast" icon-name="utility:frozen">
        <div class="slds-var-m-around_medium">
            
            <!-- Loading State -->
            <template if:true={isLoading}>
                <lightning-spinner alt="Fetching data..."></lightning-spinner>
            </template>

            <!-- Error State -->
            <template if:true={error}>
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error" role="alert">
                    <h2>{error}</h2>
                </div>
            </template>

            <!-- Success State Display -->
            <template if:true={weather}>
                <div class="slds-grid slds-grid_vertical slds-box slds-theme_shade">
                    
                    <!-- Header Section -->
                    <div class="slds-grid slds-grid_align-spread slds-var-m-bottom_medium slds-border_bottom slds-var-p-bottom_small">
                        <div>
                            <h3 class="slds-text-heading_medium font-weight-bold">{weather.location.name}, {weather.location.country}</h3>
                            <p class="slds-text-color_weak slds-text-body_small">Local Time: {weather.location.localtime}</p>
                        </div>
                        <div class="slds-text-align_right">
                            <span class="slds-badge slds-theme_success">{weather.current.condition.text}</span>
                        </div>
                    </div>

                    <!-- Metrics Dashboard Grid -->
                    <div class="slds-grid slds-wrap slds-gutters">
                        
                        <!-- Temperature Tile -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                            <div class="slds-box slds-theme_card slds-text-align_center">
                                <lightning-icon icon-name="utility:dash" size="medium" class="slds-var-m-bottom_x-small"></lightning-icon>
                                <div class="slds-text-heading_large font-weight-bold">{weather.current.temp_c}°C</div>
                                <div class="slds-text-color_weak slds-var-m-top_x-small">Current Temperature</div>
                            </div>
                        </div>

                        <!-- Wind Speed Tile -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                            <div class="slds-box slds-theme_card slds-text-align_center layout-tile">
                                <lightning-icon icon-name="utility:dash" size="medium" class="slds-var-m-bottom_x-small"></lightning-icon>
                                <div class="slds-text-heading_medium font-weight-bold slds-var-m-top_x-small">{weather.current.wind_kph} km/h</div>
                                <div class="slds-text-color_weak slds-var-m-top_x-small">Wind Velocity</div>
                            </div>
                        </div>

                        <!-- Humidity Tile -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                            <div class="slds-box slds-theme_card slds-text-align_center layout-tile">
                                <lightning-icon icon-name="utility:dash" size="medium" class="slds-var-m-bottom_x-small"></lightning-icon>
                                <div class="slds-text-heading_medium font-weight-bold slds-var-m-top_x-small">{weather.current.humidity}%</div>
                                <div class="slds-text-color_weak slds-var-m-top_x-small">Relative Humidity</div>
                            </div>
                        </div>

                    </div>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
